spring:
  application:
    name: second-hand.product.moderation.platform
  security:
    user:
      name: user
      password: password

  datasource:
    url: jdbc:h2:file:./data/moderation
    driver-class-name: org.h2.Driver
    username: user
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration



application:
  security:
    jwt:
      secret: ${JWT_SECRET:local-dev-secret-32chars!!!!!!!!}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
logging:
  level:
    org.springframework.web: DEBUG
    guru.springframework.controllers: DEBUG
    org.hibernate: DEBUG
    org: INFO